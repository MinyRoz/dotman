# ===========================================================================
# dotman.conf — your dotfiles manifest.
#
# Format:
#   [section]            base section (applies to every OS)
#   [section.linux]      only on Linux
#   [section.macos]      only on macOS
#   [section.windows]    only on Windows
#   [section.wsl]        only inside WSL
#
# Sections:
#   [link]      <source-in-repo>   <destination>
#   [packages]  <manager>: <pkg1> <pkg2> ...
#   [hooks.pre] <script-in-repo>        (run before linking)
#   [hooks.post]<script-in-repo>        (run after linking + packages)
#
# Destinations support ~, $HOME, ${XDG_CONFIG_HOME}, $PROFILE, %VAR%.
# Lines starting with # are comments. Whitespace separates columns.
# ===========================================================================

# --- Files linked on every OS ----------------------------------------------
[link]
dotfiles/gitconfig        ~/.gitconfig
dotfiles/editorconfig     ~/.editorconfig
dotfiles/vimrc            ~/.vimrc

# --- Unix shells (Linux + macOS + WSL) -------------------------------------
[link.linux]
dotfiles/bashrc           ~/.bashrc
dotfiles/aliases.sh       ~/.config/shell/aliases.sh

[link.macos]
dotfiles/bashrc           ~/.bashrc
dotfiles/aliases.sh       ~/.config/shell/aliases.sh

[link.wsl]
dotfiles/bashrc           ~/.bashrc

# --- Windows ---------------------------------------------------------------
[link.windows]
dotfiles/windows/profile.ps1   $PROFILE

# --- Packages (only managers that exist on the machine are used) -----------
[packages.macos]
brew: git neovim ripgrep fzf

[packages.linux]
apt: git neovim ripgrep fzf

[packages.windows]
winget: Git.Git Neovim.Neovim BurntSushi.ripgrep.MSVC junegunn.fzf

# --- Hooks -----------------------------------------------------------------
[hooks.post]
scripts/post-install.sh
